server:
  port: 8080

spring:
  application:
    name: defense-gateway
  datasource:
    # deploy/docker-compose.yml maps MySQL to host port 3307; override DB_PORT if using local 3306
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:autonomous_defense}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    # Database credentials MUST come from environment / secrets manager.
    # Falling back to "change-me" makes the gateway fail fast at startup so a
    # real deployment cannot accidentally ship with a guessable password.
    username: ${DB_USER:change-me}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  kafka:
    event-topic: ${EVENT_TOPIC:security.events}
  cors:
    allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    root: INFO
    com.autonomous.defense.gateway: INFO
